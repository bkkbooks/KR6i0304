  - {type: variant, offset: 2050, length: 104, content: 即涅槃相，不可復滅。」此性德解脫也。如此三義，豈非本有道前之位？豈獨有金而無光明耶？又《華嚴》云「初發心時便成正覺，所有慧身不由他悟。清淨妙法身，湛然應一切。」妙法身是法身德，慧身是般若德，應一切即應身是解脫德。此之三身，地地轉增，如月漸滿，豈非道始, 甲: 無分得之法身解脫等云云若解脫在道後道後眾善普會何獨有解脫以是視之}
